{% extends "base.html" %}

{% block title %}
Create Employee
{% endblock %}

{% block content %}
<div class="card p-4">
    <form method="POST" class="form-group">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Save Employee</button>
        <a href="{% url 'list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
