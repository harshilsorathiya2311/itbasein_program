{% extends 'layouts/app.html' %}

{% block content %}

<style>
  .login-card {
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    background: #ffffff;
  }

  .login-title {
    font-weight: 600;
    text-align: center;
    margin-bottom: 20px;
  }

  .form-control {
    border-radius: 8px;
    padding: 10px;
  }

  .btn-dark {
    width: 100%;
    border-radius: 8px;
    padding: 10px;
    font-weight: 500;
  }

  .register-link {
    display: block;
    text-align: center;
    margin-top: 10px;
  }
</style>

<div class="row justify-content-center mt-5">
  <div class="col-sm-5">
    <div class="login-card">

      <h2 class="login-title text-muted">Login</h2>

      {% if form.non_field_errors %}
      <div class="alert alert-danger p-2">
        {{ form.non_field_errors }}
      </div>
      {% endif %}

      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="form-group mb-3">
          <label for="{{ form.username.id_for_label }}">Username</label>
          <input type="text" name="{{ form.username.name }}" class="form-control" placeholder="Enter username"
            value="{{ form.username.value }}" />
          <small class="text-danger">{{ form.username.errors }}</small>
        </div>

        <div class="form-group mb-3">
          <label for="{{ form.password.id_for_label }}">Password</label>
          <input type="password" name="{{ form.password.name }}" class="form-control" placeholder="Enter password" />
          <small class="text-danger">{{ form.password.errors }}</small>
        </div>

        <button type="submit" class="btn btn-dark">Login</button>

        <div class="register-link">
          <a href="{% url 'register' %}">Don't have an account? Register</a>
        </div>

      </form>

    </div>
  </div>
</div>

{% endblock %}
